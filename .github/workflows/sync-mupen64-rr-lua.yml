name: Sync mupen64-rr-lua

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repack
        uses: actions/checkout@v4

      - name: Get latest successful run SHA on main
        id: latest
        env:
          GH_TOKEN: ${{ secrets.MUPEN_PAT }}
        run: |
          SHA=$(gh api \
            "repos/mupen64/mupen64-rr-lua/actions/runs?branch=main&status=success&per_page=1" \
            -q '.workflow_runs[0].head_sha')
          RUN_ID=$(gh api \
            "repos/mupen64/mupen64-rr-lua/actions/runs?branch=main&status=success&per_page=1" \
            -q '.workflow_runs[0].id')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Check stored state
        id: state
        run: |
          STORED=$(cat .github/sync-state/mupen64-rr-lua.txt 2>/dev/null || echo "none")
          echo "stored=$STORED" >> "$GITHUB_OUTPUT"

      - name: Download and merge artifact
        if: steps.latest.outputs.sha != steps.state.outputs.stored
        env:
          GH_TOKEN: ${{ secrets.MUPEN_PAT }}
          RUN_ID: ${{ steps.latest.outputs.run_id }}
        run: |
          gh run download "$RUN_ID" \
            --repo mupen64/mupen64-rr-lua \
            --name mupen-release \
            --dir _artifact
          # Merge flat: mupen64.exe → root, plugin/* → plugin/
          cp -f _artifact/mupen64.exe mupen64.exe
          if [ -d _artifact/plugin ]; then
            mkdir -p plugin
            cp -rf _artifact/plugin/. plugin/
          fi
          rm -rf _artifact

      - name: Commit and push
        if: steps.latest.outputs.sha != steps.state.outputs.stored
        env:
          SHA: ${{ steps.latest.outputs.sha }}
        run: |
          echo "$SHA" > .github/sync-state/mupen64-rr-lua.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mupen64.exe plugin/ .github/sync-state/mupen64-rr-lua.txt
          git diff --staged --quiet || git commit -m "chore: sync mupen64-rr-lua @ ${SHA:0:7}"
          git push
